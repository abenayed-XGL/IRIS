# site properties and page defaults
title: Intelligent Radio and Integrated Systems Laboratory
subtitle: HKUST
description: The IRIS Lab, led by Prof. Ahmed Ben Ayed, develops next-generation high-frequency RF systems through research at the intersection of hardware, signal processing, and test and measurement techniques.
header: images/backgroundV3.png
footer: images/backgroundV3.png
proofer: false

# site social media and other links
links:
  email: abenayed@ust.hk
  orcid: 0000-0002-4310-1368
  google-scholar: X3t3jt0AAAAJ
  github: abenayed-XGL
  twitter: abenayed-XGL
  youtube: abenayed-XGL

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
